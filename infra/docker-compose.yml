# Self-hosted Sveltry infrastructure: Postgres + open-source Convex backend +
# the Convex admin dashboard. The SvelteKit app (apps/dashboard) runs separately
# (see README) and connects to the backend over its public origin.
#
# Run from the repo root:
#   docker compose --env-file infra/.env -f infra/docker-compose.yml up -d
#
# Postgres is the Convex backend's own store only (the `convex_self_hosted`
# database). Auth runs entirely on Convex (the Better Auth component), so there
# is no separate identity database; the app never connects to Postgres.

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sveltry_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - '${BACKEND_PORT:-3210}:3210'
      - '${SITE_PROXY_PORT:-3211}:3211'
    volumes:
      - backend-data:/convex/data
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME:-convex-self-hosted}
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}
      # POSTGRES_URL must be host-only (no database name, no query params); the
      # backend derives the db name `convex_self_hosted` from the instance name.
      - POSTGRES_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-sveltry_dev_password}@postgres:5432
      - DO_NOT_REQUIRE_SSL=${DO_NOT_REQUIRE_SSL:-1}
      - DISABLE_BEACON=${DISABLE_BEACON:-true}
      - DISABLE_METRICS_ENDPOINT=${DISABLE_METRICS_ENDPOINT:-true}
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3210/version']
      interval: 5s
      start_period: 15s
      timeout: 5s
      retries: 20

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    ports:
      - '${CONVEX_DASHBOARD_PORT:-6791}:6791'
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
    depends_on:
      backend:
        condition: service_healthy

  # The Sveltry SvelteKit app. Opt in with `--profile app` once the backend is
  # deployed:
  #   docker compose --env-file infra/.env -f infra/docker-compose.yml --profile app up -d --build app
  #
  # All-Docker auth note: auth runs entirely on Convex (the Better Auth component);
  # the app does not connect to Postgres. After deploy, set the deployment's
  # `SITE_URL` to the browser origin (PUBLIC_APP_URL) for the trusted-origin check,
  # and `CONVEX_INTERNAL_SITE_URL` to the in-container origin the backend uses to
  # fetch its own JWKS (the host-mapped CONVEX_SITE_URL is not reachable inside the
  # container):
  #   cd apps/backend && bunx convex env set SITE_URL http://localhost:3000
  #   cd apps/backend && bunx convex env set CONVEX_INTERNAL_SITE_URL http://localhost:3211
  app:
    profiles: ['app']
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      - PUBLIC_CONVEX_URL=${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
      - PUBLIC_CONVEX_SITE_URL=${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}
      - PUBLIC_SVELTRY_INGEST_URL=${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  backend-data:
