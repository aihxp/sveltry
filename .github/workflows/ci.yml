name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test suites (all workspaces)
        run: bun run --filter '*' --if-present test

      - name: Type-check all workspaces
        run: bun run check

      - name: Build
        run: bun run build
        # The SvelteKit auth adapter reads these public URLs from $env/static/public
        # at build time. Real values are supplied per deployment; these committed
        # defaults just let the build resolve.
        env:
          PUBLIC_CONVEX_URL: http://127.0.0.1:3210
          PUBLIC_CONVEX_SITE_URL: http://127.0.0.1:3211
          PUBLIC_APP_URL: http://localhost:5173

  format:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: bun install --frozen-lockfile
      - run: bunx prettier --check .
      - run: bunx eslint .
