version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      svelte:
        patterns: ['svelte', '@sveltejs/*', 'vite', '@tailwindcss/*', 'tailwindcss']
      convex:
        patterns: ['convex', 'convex-svelte', 'convex-helpers']
      auth:
        patterns: ['better-auth', 'pg', '@types/pg', 'jose']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
