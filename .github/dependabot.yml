version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      svelte:
        patterns: ['svelte', '@sveltejs/*', 'vite', '@tailwindcss/*', 'tailwindcss']
      convex:
        patterns: ['convex', 'convex-svelte', 'convex-helpers']
      auth:
        patterns: ['better-auth', 'pg', '@types/pg', 'jose']
      # Batch everything else (prettier, changesets, types, etc.) into a single
      # PR instead of one per dependency, to cut review churn.
      tooling:
        patterns: ['*']
    ignore:
      # TypeScript majors are deliberate migrations (new diagnostics, dropped
      # targets), not bot-driven bumps. Upgrade them by hand.
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
      # changelog-github 0.7.x breaks against the pinned @changesets/cli 2.x;
      # only accept patch updates until the changesets toolchain moves together.
      - dependency-name: '@changesets/changelog-github'
        update-types:
          ['version-update:semver-minor', 'version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ['*']
